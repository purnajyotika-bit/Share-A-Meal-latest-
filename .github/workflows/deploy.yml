name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Change to "master" if your default branch uses that name

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # --- OPTIONAL: UNCOMMENT NEXT 3 LINES IF USING NODE/REACT/VITE ---
      # - name: Set up Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: 20
      #     cache: 'npm'

      - name: Install Dependencies & Build
        run: |
          # If using plain HTML/CSS, change this to: mkdir dist && cp -r ./* dist/
          npm install
          npm run build 

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Change to './build' or './' depending on your framework build folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
